name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21", "25", "26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        run: docker --version

      - name: Verify
        run: make verify JAVA_VERSION=${{ matrix.java-version }}
